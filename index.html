<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻排盘 - 周易占卜</title>
    <style>
        :root {
            --bg: #0d0d14;
            --bg-card: #1a1a28;
            --bg-card2: #1f1f30;
            --gold: #c9a96e;
            --gold-light: #d4b87a;
            --gold-dark: #a67c3d;
            --text: #e0dcd0;
            --text-secondary: #a09b8c;
            --text-dim: #6b6558;
            --border: #2a2a3a;
            --accent-red: #c0392b;
            --accent-green: #5d8a5e;
            --shadow-gold: 0 0 30px rgba(201, 169, 110, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-cn: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', 'KaiTi', serif;
            --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(201, 169, 110, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(180, 140, 100, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(160, 120, 70, 0.03) 0%, transparent 50%);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景装饰纹样 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.025;
            background-image: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 40px,
                    rgba(201, 169, 110, 0.5) 40px,
                    rgba(201, 169, 110, 0.5) 41px),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 40px,
                    rgba(201, 169, 110, 0.5) 40px,
                    rgba(201, 169, 110, 0.5) 41px);
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 560px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 60px;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            padding: 10px 0;
        }
        .header .icon-taiji {
            display: inline-block;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: conic-gradient(from 90deg, #1a1a28 0% 50%, #c9a96e 50% 100%);
            position: relative;
            margin-bottom: 12px;
            box-shadow: var(--shadow-gold);
            animation: taiji-rotate 20s linear infinite;
        }
        .header .icon-taiji::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #c9a96e;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 0 6px #1a1a28;
        }
        @keyframes taiji-rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        .header h1 {
            font-family: var(--font-cn);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--gold-light);
            text-shadow: 0 0 40px rgba(201, 169, 110, 0.3);
        }
        .header .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            margin-top: 2px;
        }

        /* 卡片 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
            opacity: 0.5;
        }
        .card:hover {
            border-color: rgba(201, 169, 110, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), var(--shadow-gold);
        }

        /* 摇卦区域 */
        .shake-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
        }
        .coins-display {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 90px;
        }
        .coin {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e8d5a3, #c4a265, #a07830);
            border: 3px solid #8b6914;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #5c3d0e;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transition: all 0.4s ease;
            cursor: default;
            user-select: none;
            position: relative;
            font-family: var(--font-cn);
        }
        .coin.rolling {
            animation: coin-roll 0.6s ease-out;
        }
        .coin.heads {
            background: linear-gradient(145deg, #f0e0b8, #d4b060, #b08828);
            border-color: #8b6914;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3), 0 0 24px rgba(201, 169, 110, 0.4);
        }
        .coin.tails {
            background: linear-gradient(145deg, #c8b888, #a08040, #705020);
            border-color: #6b4e10;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }
        @keyframes coin-roll {
            0% {
                transform: translateY(-60px) rotateX(0deg) rotateY(0deg);
                opacity: 0.6;
            }
            30% {
                transform: translateY(-30px) rotateX(360deg) rotateY(180deg);
                opacity: 1;
            }
            60% {
                transform: translateY(-10px) rotateX(720deg) rotateY(360deg);
            }
            100% {
                transform: translateY(0) rotateX(900deg) rotateY(540deg);
            }
        }

        .btn {
            padding: 14px 36px;
            font-size: 1.05rem;
            font-family: var(--font-cn);
            font-weight: 600;
            letter-spacing: 0.06em;
            border: 2px solid var(--gold-dark);
            background: transparent;
            color: var(--gold-light);
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            z-index: 1;
            backdrop-filter: blur(4px);
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(201, 169, 110, 0.15), rgba(201, 169, 110, 0.05));
            z-index: -1;
            transition: var(--transition);
        }
        .btn:hover {
            border-color: var(--gold-light);
            color: #fff;
            box-shadow: 0 0 30px rgba(201, 169, 110, 0.3), 0 0 60px rgba(201, 169, 110, 0.1);
            transform: translateY(-2px);
        }
        .btn:hover::before {
            background: linear-gradient(135deg, rgba(201, 169, 110, 0.3), rgba(201, 169, 110, 0.12));
        }
        .btn:active {
            transform: scale(0.96);
            transition: 0.1s;
        }
        .btn-primary {
            background: linear-gradient(135deg, rgba(180, 130, 60, 0.4), rgba(140, 100, 40, 0.3));
            border-color: var(--gold);
            color: #fff;
            font-size: 1.1rem;
            padding: 16px 44px;
            letter-spacing: 0.1em;
        }
        .btn-sm {
            padding: 8px 20px;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 卦象显示 */
        .gua-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 0;
        }
        .yao-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            width: 100%;
            max-width: 420px;
            cursor: default;
            position: relative;
            min-height: 48px;
        }
        .yao-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .yao-label {
            font-family: var(--font-cn);
            font-size: 0.85rem;
            color: var(--text-dim);
            width: 32px;
            text-align: center;
            flex-shrink: 0;
            letter-spacing: 0.05em;
        }
        .yao-line-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 36px;
        }
        .yao-line {
            height: 4px;
            border-radius: 2px;
            transition: all 0.5s ease;
            position: relative;
        }
        .yao-line.yang {
            width: 100%;
            max-width: 180px;
            background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
            box-shadow: 0 0 12px rgba(201, 169, 110, 0.3);
        }
        .yao-line.yin {
            display: flex;
            gap: 18px;
            justify-content: center;
            width: 100%;
            max-width: 180px;
        }
        .yao-line.yin::before,
        .yao-line.yin::after {
            content: '';
            width: 62px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, transparent, rgba(180, 160, 130, 0.7), transparent);
            box-shadow: 0 0 8px rgba(180, 160, 130, 0.2);
        }
        .yao-line.moving {
            animation: pulse-yao 1.8s ease-in-out infinite;
        }
        @keyframes pulse-yao {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.55;
            }
        }
        .yao-marker {
            position: absolute;
            font-size: 0.9rem;
            font-weight: bold;
            color: #e74c3c;
            font-family: var(--font-cn);
            animation: pulse-yao 1.8s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
            pointer-events: none;
        }
        .yao-marker.circle {
            font-size: 1.1rem;
        }
        .yao-info {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            min-width: 100px;
            justify-content: flex-end;
            flex-shrink: 0;
            font-family: var(--font-cn);
        }
        .yao-info .najia {
            color: var(--text-dim);
            font-size: 0.75rem;
        }
        .yao-info .liuqin {
            font-weight: 600;
            color: #c9a96e;
            letter-spacing: 0.04em;
        }
        .badge-shi,
        .badge-ying {
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }
        .badge-shi {
            background: rgba(201, 169, 110, 0.2);
            color: #e8c97a;
            border: 1px solid rgba(201, 169, 110, 0.4);
        }
        .badge-ying {
            background: rgba(160, 160, 180, 0.2);
            color: #b0b0c0;
            border: 1px solid rgba(160, 160, 180, 0.4);
        }

        /* 卦名标题 */
        .gua-title-section {
            text-align: center;
            padding: 6px 0;
        }
        .gua-name-main {
            font-family: var(--font-cn);
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.1em;
        }
        .gua-name-main .divider {
            color: var(--gold-dark);
            margin: 0 8px;
            font-weight: 300;
        }
        .gua-subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            margin-top: 2px;
        }

        /* 双卦并排 */
        .dual-gua {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 500px) {
            .dual-gua {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .yao-info {
                min-width: 70px;
                font-size: 0.7rem;
                gap: 4px;
            }
            .yao-row {
                gap: 6px;
                padding: 6px 8px;
            }
            .yao-line.yin::before,
            .yao-line.yin::after {
                width: 40px;
            }
            .yao-line.yang {
                max-width: 120px;
            }
            .yao-line.yin {
                gap: 10px;
                max-width: 120px;
            }
        }
        .gua-mini-title {
            text-align: center;
            font-family: var(--font-cn);
            font-size: 0.9rem;
            color: var(--gold-light);
            letter-spacing: 0.06em;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .gua-mini-title .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(201, 169, 110, 0.15);
            margin-left: 6px;
            font-weight: 400;
        }

        /* 信息条 */
        .info-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: var(--font-cn);
            letter-spacing: 0.04em;
        }
        .info-bar span {
            background: var(--bg-card2);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .info-bar .highlight {
            color: var(--gold-light);
            font-weight: 600;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: var(--bg-card);
            border: 1px solid var(--gold-dark);
            color: var(--gold-light);
            padding: 12px 28px;
            border-radius: 30px;
            font-family: var(--font-cn);
            letter-spacing: 0.06em;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.hide {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
        }

        /* 加载闪烁 */
        .shimmer {
            background: linear-gradient(90deg, var(--bg-card2) 25%, rgba(201, 169, 110, 0.08) 50%, var(--bg-card2) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(201, 169, 110, 0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="icon-taiji"></div>
            <h1>六爻排盘</h1>
            <p class="subtitle">周 易 占 卜 · 铜 钱 起 卦</p>
        </div>

        <!-- 摇卦卡片 -->
        <div class="card" id="shakeCard">
            <div class="shake-area">
                <div class="coins-display" id="coinsDisplay">
                    <div class="coin" id="coin1">🪙</div>
                    <div class="coin" id="coin2">🪙</div>
                    <div class="coin" id="coin3">🪙</div>
                </div>
                <p style="color:var(--text-dim);font-size:0.8rem;text-align:center;" id="shakeHint">
                    点击下方按钮，摇动铜钱起卦
                </p>
                <div class="btn-group">
                    <button class="btn btn-primary" id="btnShake" title="随机摇卦">
                        ✦ 摇 卦 ✦
                    </button>
                </div>
                <div class="btn-group" style="margin-top:4px;">
                    <button class="btn btn-sm" id="btnTimeGua">📅 时间起卦</button>
                    <button class="btn btn-sm" id="btnClear">↺ 清空</button>
                </div>
                <div style="font-size:0.7rem;color:var(--text-dim);text-align:center;margin-top:4px;">
                    已摇 <span id="shakeCount" style="color:var(--gold-light);">0</span>/6 爻
                </div>
            </div>
        </div>

        <!-- 排盘结果 -->
        <div class="card" id="resultCard" style="display:none;">
            <div class="gua-title-section" id="guaTitleSection"></div>
            <div class="dual-gua" id="dualGuaContainer"></div>
            <div class="info-bar" id="infoBar" style="margin-top:16px;"></div>
        </div>

        <!-- 说明 -->
        <div class="card" style="padding:16px 20px;">
            <p style="font-size:0.75rem;color:var(--text-dim);text-align:center;letter-spacing:0.04em;font-family:var(--font-cn);">
                📖 三枚铜钱，摇六次成卦 · 老阳(⚊○)老阴(⚋×)为动爻 · 本卦变卦相参
            </p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast hide" id="toast"></div>

    <script>
        (function() {
            // ==================== 八卦基础数据 ====================
            const BAGUA = {
                1: { name: '乾', wuxing: '金', symbol: '☰', nature: '天' },
                2: { name: '兑', wuxing: '金', symbol: '☱', nature: '泽' },
                3: { name: '离', wuxing: '火', symbol: '☲', nature: '火' },
                4: { name: '震', wuxing: '木', symbol: '☳', nature: '雷' },

                ],
                '震': [

                    ['雷水解', 4, 6, 2],

                    ['地风升', 8, 5, 4],

                    ['泽风大过', 2, 5, 4],
                    ['泽雷随', 2, 4, 3]
                ],
                '巽': [
                    ['巽为风', 5, 5, 6],

                    ['风雷益', 5, 4, 3],
                    ['天雷无妄', 1, 4, 4],
                    ['火雷噬嗑', 3, 4, 5],
                    ['山雷颐', 7, 4, 4],
                    ['山风蛊', 7, 5, 3]
                ],
                '离': [

                    ['火水未济', 3, 6, 3],
                    ['山水蒙', 7, 6, 4],
                    ['风水涣', 5, 6, 5],
                    ['天水讼', 1, 6, 4],
                    ['天火同人', 1, 3, 3]
                ],
                '坤': [
                    ['坤为地', 8, 8, 6],
                    ['地雷复', 8, 4, 1],
                    ['地泽临', 8, 2, 2],
                    ['地天泰', 8, 1, 3],
                    ['雷天大壮', 4, 1, 4],
                    ['泽天夬', 2, 1, 5],
                    ['水天需', 6, 1, 4],
                    ['水地比', 6, 8, 3]
                ],
                '兑': [
                    ['兑为泽', 2, 2, 6],
                    ['泽水困', 2, 6, 1],
                    ['泽地萃', 2, 8, 2],
                    ['泽山咸', 2, 7, 3],
                    ['水山蹇', 6, 7, 4],
                    ['地山谦', 8, 7, 5],
                    ['雷山小过', 4, 7, 4],
                    ['雷泽归妹', 4, 2, 3]
                ]
            };

            // 构建64卦快速查找表
            const GUA64_MAP = {}; // key: "上卦-下卦" -> {name, gong, shiYao, gongWuxing}
            for (const [gongName, guaList] of Object.entries(GONG_DATA)) {
                const gongWuxing = BAGUA[Object.keys(BAGUA).find(k => BAGUA[k].name === gongName)]?.wuxing || '土';
                guaList.forEach(([name, shang, xia, shiYao]) => {
                    const key = `${shang}-${xia}`;
                    GUA64_MAP[key] = { name, gong: gongName, shiYao, gongWuxing, shangGua: shang, xiaGua: xia };
                });
            }

            // 纳甲基础数据 (八纯卦的纳甲，从初爻到上爻)
            const NAJIA_BASE = {
                1: ['子', '寅', '辰', '午', '申', '戌'], // 乾
                2: ['巳', '卯', '丑', '亥', '酉', '未'], // 兑
                3: ['卯', '丑', '亥', '酉', '未', '巳'], // 离
                4: ['子', '寅', '辰', '午', '申', '戌'], // 震 (同乾)
                5: ['丑', '亥', '酉', '未', '巳', '卯'], // 巽
                6: ['寅', '辰', '午', '申', '戌', '子'], // 坎
                7: ['辰', '午', '申', '戌', '子', '寅'], // 艮
                8: ['未', '巳', '卯', '丑', '亥', '酉'], // 坤
            };

            // 地支五行
            const DIZHI_WUXING = {
                '子': '水',
                '丑': '土',
                '寅': '木',
                '卯': '木',
                '辰': '土',
                '巳': '火',
                '午': '火',
                '未': '土',
                '申': '金',
                '酉': '金',
                '戌': '土',
                '亥': '水'
            };

            // 六亲关系: 以"我"(宫位五行)为基准
            function getLiuQin(woWuxing, yaoWuxing) {
                const relation = {
                    '金': { '金': '兄弟', '水': '子孙', '木': '妻财', '火': '官鬼', '土': '父母' },
                    '水': { '水': '兄弟', '木': '子孙', '火': '妻财', '土': '官鬼', '金': '父母' },
                    '木': { '木': '兄弟', '火': '子孙', '土': '妻财', '金': '官鬼', '水': '父母' },
                    '火': { '火': '兄弟', '土': '子孙', '金': '妻财', '水': '官鬼', '木': '父母' },
                    '土': { '土': '兄弟', '金': '子孙', '水': '妻财', '木': '官鬼', '火': '父母' },
                };
                return relation[woWuxing]?.[yaoWuxing] || '未知';
            }

            // 六兽 (根据日干确定初爻六兽)
            const LIUSHOU_ORDER = ['青龙', '朱雀', '勾陈', '螣蛇', '白虎', '玄武'];
            const RI_GAN_LIUSHOU = {
                '甲': 0,
                '乙': 0,
                '丙': 1,
                '丁': 1,
                '戊': 2,
                '己': 3,
                '庚': 4,
                '辛': 4,
                '壬': 5,
                '癸': 5
            };

            function getLiuShou(riGan) {
                const startIndex = RI_GAN_LIUSHOU[riGan] || 0;
                const result = [];
                for (let i = 0; i < 6; i++) {
                    result.push(LIUSHOU_ORDER[(startIndex + i) % 6]);
                }
                return result; // 初爻到上爻
            }

            // ==================== 状态管理 ====================
            let shakeResults = []; // 存储6次摇卦结果 [{value: 6|7|8|9, isMoving: bool}]
            let currentShakeIndex = 0;

            // ==================== DOM元素 ====================
            const $coinsDisplay = document.getElementById('coinsDisplay');
            const $coin1 = document.getElementById('coin1');
            const $coin2 = document.getElementById('coin2');
            const $coin3 = document.getElementById('coin3');
            const $btnShake = document.getElementById('btnShake');
            const $btnTimeGua = document.getElementById('btnTimeGua');
            const $btnClear = document.getElementById('btnClear');
            const $shakeHint = document.getElementById('shakeHint');
            const $shakeCount = document.getElementById('shakeCount');
            const $resultCard = document.getElementById('resultCard');
            const $guaTitleSection = document.getElementById('guaTitleSection');
            const $dualGuaContainer = document.getElementById('dualGuaContainer');
            const $infoBar = document.getElementById('infoBar');
            const $toast = document.getElementById('toast');

            // ==================== Toast ====================
            let toastTimer;

            function showToast(msg) {
                clearTimeout(toastTimer);
                $toast.textContent = msg;
                $toast.classList.remove('hide');
                $toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    $toast.classList.remove('show');
                    $toast.classList.add('hide');
                }, 1800);
            }

            // ==================== 铜钱动画 ====================
            function animateCoins(callback) {
                const coins = [$coin1, $coin2, $coin3];
                coins.forEach(c => c.classList.add('rolling'));
                $btnShake.disabled = true;
                $btnTimeGua.disabled = true;
                $shakeHint.textContent = '铜钱转动中...';

                setTimeout(() => {
                    coins.forEach(c => c.classList.remove('rolling'));
                    callback();
                    $btnShake.disabled = false;
                    $btnTimeGua.disabled = false;
                }, 650);
            }

            function displayCoinResults(results) {
                const coinEls = [$coin1, $coin2, $coin3];
                const valueToDisplay = { 6: '阴 ×', 7: '阳', 8: '阴', 9: '阳 ○' };
                const valueToClass = { 6: 'tails', 7: 'heads', 8: 'tails', 9: 'heads' };

                results.forEach((val, i) => {
                    coinEls[i].textContent = valueToDisplay[val] || '?';
                    coinEls[i].className = 'coin ' + (valueToClass[val] || '');
                });
            }

            // ==================== 摇卦逻辑 ====================
            function shakeOnce() {
                // 模拟三枚铜钱
                const coins = [];
                for (let i = 0; i < 3; i++) {
                    coins.push(Math.random() < 0.5 ? 2 : 3); // 2=反面(阴), 3=正面(阳)
                }
                const total = coins[0] + coins[1] + coins[2];
                // 6=老阴(动), 7=少阳, 8=少阴, 9=老阳(动)
                return {
                    value: total,
                    isMoving: total === 6 || total === 9,
                    coins: coins
                };
            }

            function performShake() {
                if (currentShakeIndex >= 6) {
                    showToast('已摇满六爻，请先清空再摇');
                    return;
                }
                animateCoins(() => {
                    const result = shakeOnce();
                    displayCoinResults([result.value, result.value, result.value]);
                    // 实际显示用三枚的具体结果
                    const coinVals = result.coins;
                    const displayVals = coinVals.map(c => c === 3 ? 7 : 8); // 简化显示
                    // 重新显示为实际三枚
                    const actualDisplay = coinVals.map(c => c === 3 ? 9 : 6); // 用9和6代表
                    // 还是用value统一显示
                    displayCoinResults([result.value, result.value, result.value]);

                    shakeResults.push(result);
                    currentShakeIndex++;
                    $shakeCount.textContent = currentShakeIndex;

                    const totalVal = result.value;
                    const descMap = { 6: '老阴(动爻×)', 7: '少阳', 8: '少阴', 9: '老阳(动爻○)' };
                    $shakeHint.textContent =
                        `第${currentShakeIndex}爻：${descMap[totalVal]} | 合计${totalVal} (三枚铜钱)`;

                    if (currentShakeIndex >= 6) {
                        $shakeHint.textContent = '六爻已齐备，请看排盘结果 ↓';
                        $btnShake.disabled = true;
                        setTimeout(() => renderPaiPan(), 400);
                    }
                });
            }

            function timeQiGua() {
                if (currentShakeIndex >= 6) {
                    showToast('已摇满六爻，请先清空');
                    return;
                }
                // 使用当前时间生成剩余爻
                const remaining = 6 - currentShakeIndex;
                animateCoins(() => {
                    for (let i = 0; i < remaining; i++) {
                        const now = Date.now() + i * 137;
                        const seed = (now % 10000) / 10000;
                        const coins = [];
                        for (let j = 0; j < 3; j++) {
                            coins.push(((Math.floor(seed * (j + 1) * 7.13) % 2) === 0) ? 2 : 3);
                        }
                        const total = coins[0] + coins[1] + coins[2];
                        shakeResults.push({
                            value: total,
                            isMoving: total === 6 || total === 9,
                            coins: coins
                        });
                    }
                    currentShakeIndex = 6;
                    $shakeCount.textContent = 6;
                    displayCoinResults([shakeResults[5].value, shakeResults[5].value, shakeResults[5].value]);
                    $shakeHint.textContent = '六爻已齐备（时间起卦），请看排盘结果 ↓';
                    $btnShake.disabled = true;
                    setTimeout(() => renderPaiPan(), 400);
                });
            }

            function clearAll() {
                shakeResults = [];
                currentShakeIndex = 0;
                $shakeCount.textContent = '0';
                $shakeHint.textContent = '点击下方按钮，摇动铜钱起卦';
                $btnShake.disabled = false;
                $btnTimeGua.disabled = false;
                $resultCard.style.display = 'none';
                // 重置铜钱显示
                [$coin1, $coin2, $coin3].forEach(c => {
                    c.textContent = '🪙';
                    c.className = 'coin';
                });
                showToast('已清空，重新起卦');
            }

            // ==================== 排盘渲染 ====================
            function renderPaiPan() {
                if (shakeResults.length !== 6) return;

                // 从下往上：初爻=index0, 上爻=index5
                const benGuaYao = shakeResults.map(r => ({
                    value: r.value,
                    isYang: r.value === 7 || r.value === 9,
                    isMoving: r.isMoving
                }));

                // 确定本卦的上卦和下卦
                const xiaGuaNum = getGuaNumFromYao(benGuaYao.slice(0, 3)); // 下卦(初二三)
                const shangGuaNum = getGuaNumFromYao(benGuaYao.slice(3, 6)); // 上卦(四五上)

                // 变卦
                const bianGuaYao = benGuaYao.map(y => ({
                    isYang: y.isMoving ? !y.isYang : y.isYang,
                    isMoving: false
                }));
                const bianXiaGuaNum = getGuaNumFromYao(bianGuaYao.slice(0, 3));
                const bianShangGuaNum = getGuaNumFromYao(bianGuaYao.slice(3, 6));

                // 查找本卦信息
                const benKey = `${shangGuaNum}-${xiaGuaNum}`;
                const benGuaInfo = GUA64_MAP[benKey];
                const bianKey = `${bianShangGuaNum}-${bianXiaGuaNum}`;
                const bianGuaInfo = GUA64_MAP[bianKey];

                if (!benGuaInfo) {
                    showToast('卦象查找失败，请重试');
                    return;
                }

                const gongWuxing = benGuaInfo.gongWuxing;
                const shiYao = benGuaInfo.shiYao;
                const yingYao = ((shiYao + 2) % 6) + 1; // 世+3，循环1-6

                // 获取纳甲
                const benNajia = getNajiaForGua(shangGuaNum, xiaGuaNum);
                const bianNajia = getNajiaForGua(bianShangGuaNum, bianXiaGuaNum);

                // 日干（用当前日期）
                const todayGan = getRiGan();
                const liuShou = getLiuShou(todayGan);

                // 是否有动爻
                const hasMovingYao = benGuaYao.some(y => y.isMoving);

                // 渲染标题
                const bgShang = BAGUA[shangGuaNum];
                const bgXia = BAGUA[xiaGuaNum];
                $guaTitleSection.innerHTML = `
                    <div class="gua-name-main">
                        ${bgShang?.symbol || '?'} <span>${benGuaInfo.name}</span> <span class="divider">|</span>
                        ${bgXia?.symbol || '?'}
                    </div>
                    <div class="gua-subtitle">
                        宫位：<span style="color:#c9a96e;">${benGuaInfo.gong}宫</span> ·
                        五行：<span style="color:#c9a96e;">${gongWuxing}</span> ·
                        世爻：<span style="color:#e8c97a;">第${shiYao}爻</span> ·
                        日干：<span style="color:#c9a96e;">${todayGan}</span>
                        ${hasMovingYao ? ' · <span style="color:#e74c3c;">有动爻</span>' : ' · <span style="color:#5d8a5e;">静卦</span>'}
                    </div>
                `;

                // 渲染双卦
                $dualGuaContainer.innerHTML = `
                    <div>
                        <div class="gua-mini-title">本卦 <span class="tag">${benGuaInfo.name}</span></div>
                        ${renderYaoList(benGuaYao, benNajia, gongWuxing, shiYao, yingYao, liuShou, true)}
                    </div>
                    <div>
                        <div class="gua-mini-title">变卦 <span class="tag">${bianGuaInfo?.name || '—'}</span></div>
                        ${renderYaoList(bianGuaYao, bianNajia, gongWuxing, shiYao, yingYao, liuShou, false)}
                    </div>
                `;

                // 信息栏
                const movingInfo = benGuaYao.map((y, i) => y.isMoving ? `第${i+1}爻动` : null).filter(Boolean).join(
                    '、');
                $infoBar.innerHTML = `
                    <span>宫位五行：<span class="highlight">${gongWuxing}</span></span>
                    <span>世爻：<span class="highlight">第${shiYao}爻</span></span>
                    <span>应爻：<span class="highlight">第${yingYao}爻</span></span>
                    ${movingInfo ? `<span>动爻：<span class="highlight" style="color:#e74c3c;">${movingInfo}</span></span>` : '<span>静卦</span>'}
                    <span>日干六兽始：<span class="highlight">${liuShou[0]}</span></span>
                `;

                $resultCard.style.display = 'block';
                $resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            function renderYaoList(yaoArr, najiaArr, gongWuxing, shiYao, yingYao, liuShou, isBenGua) {
                const yaoNames = ['初', '二', '三', '四', '五', '上'];
                let html = '<div class="gua-display">';
                // 从上往下显示（上爻在顶部）
                for (let i = 5; i >= 0; i--) {
                    const yao = yaoArr[i];
                    const najia = najiaArr[i] || '?';
                    const yaoWuxing = DIZHI_WUXING[najia] || '?';
                    const liuqin = getLiuQin(gongWuxing, yaoWuxing);
                    const yaoPos = i + 1;
                    const isShi = yaoPos === shiYao;
                    const isYing = yaoPos === yingYao;
                    const isMoving = yao.isMoving && isBenGua;
                    const liuShouName = liuShou[i];

                    let lineHtml = '';
                    if (yao.isYang) {
                        lineHtml =
                            `<div class="yao-line yang${isMoving ? ' moving' : ''}" style="max-width:180px;"></div>`;
                    } else {
                        lineHtml =
                            `<div class="yao-line yin${isMoving ? ' moving' : ''}" style="max-width:180px;"></div>`;
                    }

                    let markerHtml = '';
                    if (isMoving) {
                        markerHtml = yao.isYang ?
                            '<span class="yao-marker circle" style="right:-18px;">○</span>' :
                            '<span class="yao-marker" style="right:-14px;">×</span>';
                    }

                    html += `
                        <div class="yao-row">
                            <span class="yao-label">${yaoNames[i]}爻</span>
                            <div class="yao-line-container">
                                ${lineHtml}
                                ${markerHtml}
                            </div>
                            <span class="yao-info">
                                <span class="najia">${najia}</span>
                                <span class="liuqin">${liuqin}</span>
                                <span style="font-size:0.65rem;color:#7a7568;">${liuShouName}</span>
                                ${isShi ? '<span class="badge-shi">世</span>' : ''}
                                ${isYing ? '<span class="badge-ying">应</span>' : ''}
                            </span>
                        </div>
                    `;
                }
                html += '</div>';
                return html;
            }

            // 根据三爻确定卦数
            function getGuaNumFromYao(threeYao) {
                // 三爻从下往上: index0=初, index1=中, index2=上
                const binary = threeYao.map(y => y.isYang ? '1' : '0').join('');
                const map = {
                    '111': 1, // 乾 ☰
                    '110': 2, // 兑 ☱
                    '101': 3, // 离 ☲
                    '100': 4, // 震 ☳
                    '011': 5, // 巽 ☴
                    '010': 6, // 坎 ☵
                    '001': 7, // 艮 ☶
                    '000': 8, // 坤 ☷
                };
                return map[binary] || 8;
            }

            // 获取卦的纳甲
            function getNajiaForGua(shangGuaNum, xiaGuaNum) {
                // 下卦使用基础纳甲
                const xiaNajia = NAJIA_BASE[xiaGuaNum] || NAJIA_BASE[8];
                // 上卦纳甲：对于纯卦直接用基础纳甲的后三爻；对于非纯卦需要调整
                if (shangGuaNum === xiaGuaNum) {
                    // 纯卦
                    return [...xiaNajia]; // 初到上
                }
                // 非纯卦：上卦纳甲使用该卦基础纳甲的后三爻
                const shangNajiaFull = NAJIA_BASE[shangGuaNum] || NAJIA_BASE[8];
                const shangNajia = shangNajiaFull.slice(3, 6); // 四五上爻
                const xiaNajiaUse = xiaNajia.slice(0, 3); // 初二三爻
                return [...xiaNajiaUse, ...shangNajia];
            }

            // 获取日干
            function getRiGan() {
                const now = new Date();
                const baseDate = new Date(2024, 0, 1); // 甲子日参考
                const diffDays = Math.floor((now - baseDate) / (1000 * 60 * 60 * 24));
                const ganIndex = ((diffDays % 10) + 10) % 10;
                const ganArr = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
                return ganArr[ganIndex];
            }

            // ==================== 事件绑定 ====================
            $btnShake.addEventListener('click', performShake);
            $btnTimeGua.addEventListener('click', timeQiGua);
            $btnClear.addEventListener('click', clearAll);

            // 键盘支持
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    if (currentShakeIndex < 6 && !$btnShake.disabled) {
                        performShake();
                    }
                }
                if (e.key === 'r' && e.ctrlKey) {
                    e.preventDefault();
                    clearAll();
                }
            });

            // ==================== 初始化 ====================
            console.log('🔮 六爻排盘系统已就绪');
            console.log('  点击"摇卦"按钮或按空格键摇卦');
            console.log('  Ctrl+R 清空重来');
            console.log('  八卦基础：', BAGUA);
            console.log('  64卦映射已加载，共', Object.keys(GUA64_MAP).length, '卦');
        })();
    </script>
</body>
</html>
