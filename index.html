<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻排盘 · 周易占卜</title>
    <style>
        :root {
            --bg: #0b0b12;
            --bg-card: #13141f;
            --bg-card2: #1a1b2a;
            --gold: #c8a45c;
            --gold-light: #e0c878;
            --gold-dark: #8b6914;
            --gold-pale: #d4c098;
            --text: #ddd8cc;
            --text-secondary: #a09a8a;
            --text-dim: #6b6554;
            --border: #252535;
            --border-gold: rgba(200, 164, 92, 0.35);
            --red: #d4644a;
            --red-glow: rgba(212, 100, 74, 0.5);
            --radius: 18px;
            --radius-sm: 10px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-cn: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', 'KaiTi', 'LiSu', serif;
            --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 15%, rgba(200, 164, 92, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 25% 70%, rgba(180, 140, 80, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 60%, rgba(160, 120, 60, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(200, 160, 90, 0.05) 0%, transparent 40%);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 浮动粒子 */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold-light);
            border-radius: 50%;
            animation: floatUp 6s ease-in infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            30% {
                opacity: 0.4;
            }
            60% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-10vh) scale(1.4);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-bottom: 50px;
        }

        /* ========== 头部 ========== */
        .header {
            text-align: center;
            padding: 8px 0 2px;
        }
        .taiji-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 10px;
        }
        .taiji {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: conic-gradient(from 90deg, #1a1a28 0% 50%, var(--gold) 50% 100%);
            animation: taijiSpin 24s linear infinite;
            box-shadow: 0 0 40px rgba(200, 164, 92, 0.25), 0 0 80px rgba(200, 164, 92, 0.08);
            position: relative;
        }
        .taiji::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--gold);
            top: 21px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 0 7px #1a1a28;
            z-index: 2;
        }
        .taiji::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #1a1a28;
            top: 21px;
            left: 50%;
            transform: translateX(-50%) translateY(-21px);
            box-shadow: 0 0 0 7px var(--gold);
            z-index: 2;
        }
        @keyframes taijiSpin {
            to {
                transform: rotate(360deg);
            }
        }
        .taiji-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(200, 164, 92, 0.2);
            animation: ringPulse 3s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }
        .header h1 {
            font-family: var(--font-cn);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--gold-light);
            text-shadow: 0 0 60px rgba(200, 164, 92, 0.35);
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 0.18em;
            margin-top: 2px;
            font-family: var(--font-cn);
        }

        /* ========== 卡片 ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: visible;
            transition: var(--transition);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
            opacity: 0.7;
        }
        .card:hover {
            border-color: rgba(200, 164, 92, 0.3);
            box-shadow: 0 14px 44px rgba(0, 0, 0, 0.6), 0 0 30px rgba(200, 164, 92, 0.08);
        }

        /* ========== 摇卦区域 ========== */
        .shake-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            padding: 8px 0 4px;
            position: relative;
        }
        .coins-platform {
            position: relative;
            width: 100%;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 600px;
        }
        .coins-tray {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        .coin {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f0deb0, #c9a050, #9a7028);
            border: 3px solid #7a5818;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a3008;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55), inset 0 2px 3px rgba(255, 255, 255, 0.35);
            cursor: default;
            user-select: none;
            position: relative;
            font-family: var(--font-cn);
            transition: transform 0.2s, box-shadow 0.3s;
            will-change: transform;
        }
        .coin::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 0, 0, 0.25);
            pointer-events: none;
        }
        .coin.heads {
            background: linear-gradient(145deg, #faf0d0, #ddc070, #b09030);
            border-color: #8b6914;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5), inset 0 2px 3px rgba(255, 255, 255, 0.4), 0 0 30px rgba(220, 180, 80, 0.35);
        }
        .coin.tails {
            background: linear-gradient(145deg, #c8b078, #9a8040, #685020);
            border-color: #5a3e10;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55), inset 0 2px 3px rgba(255, 255, 255, 0.2);
        }
        .coin.tossing {
            animation: coinToss 0.75s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        @keyframes coinToss {
            0% {
                transform: translateY(0) rotateX(0) rotateY(0) scale(1);
            }
            15% {
                transform: translateY(-70px) rotateX(200deg) rotateY(60deg) scale(1.1);
            }
            40% {
                transform: translateY(-50px) rotateX(520deg) rotateY(220deg) scale(1.05);
            }
            65% {
                transform: translateY(-18px) rotateX(800deg) rotateY(400deg) scale(1.02);
            }
            85% {
                transform: translateY(6px) rotateX(960deg) rotateY(500deg) scale(0.96);
            }
            100% {
                transform: translateY(0) rotateX(1080deg) rotateY(540deg) scale(1);
            }
        }
        .coin.land-bounce {
            animation: landBounce 0.4s ease-out;
        }
        @keyframes landBounce {
            0% {
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-14px) scale(1.06);
            }
            60% {
                transform: translateY(-4px) scale(0.98);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }
        /* 铜钱光晕 */
        .coin-glow {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 200, 80, 0.35) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: glowFade 0.7s ease-out forwards;
        }
        @keyframes glowFade {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .shake-info {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-family: var(--font-cn);
            letter-spacing: 0.04em;
            min-height: 22px;
            transition: color 0.3s;
        }
        .shake-info .highlight-num {
            color: var(--gold-light);
            font-size: 1.1rem;
            font-weight: 700;
        }
        .shake-progress {
            display: flex;
            gap: 7px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .shake-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.4s ease;
            cursor: default;
        }
        .shake-dot.filled {
            background: var(--gold);
            box-shadow: 0 0 10px rgba(200, 164, 92, 0.6);
        }
        .shake-dot.moving-dot {
            background: var(--red);
            box-shadow: 0 0 12px var(--red-glow);
            animation: dotPulse 0.8s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 8px var(--red-glow);
            }
            50% {
                box-shadow: 0 0 20px var(--red-glow), 0 0 32px rgba(212, 100, 74, 0.7);
            }
        }

        /* ========== 按钮 ========== */
        .btn {
            padding: 13px 32px;
            font-size: 1rem;
            font-family: var(--font-cn);
            font-weight: 600;
            letter-spacing: 0.07em;
            border: 2px solid var(--gold-dark);
            background: transparent;
            color: var(--gold-light);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            backdrop-filter: blur(4px);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(200, 164, 92, 0.18), rgba(200, 164, 92, 0.04));
            z-index: -1;
            transition: var(--transition);
        }
        .btn:hover {
            border-color: var(--gold-light);
            color: #fff;
            box-shadow: 0 0 36px rgba(200, 164, 92, 0.3), 0 0 70px rgba(200, 164, 92, 0.08);
            transform: translateY(-2px);
        }
        .btn:active {
            transform: scale(0.94);
            transition: 0.1s;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, rgba(180, 130, 50, 0.45), rgba(130, 90, 30, 0.35));
            border-color: var(--gold);
            color: #fff;
            font-size: 1.08rem;
            padding: 15px 40px;
            letter-spacing: 0.12em;
            font-weight: 700;
        }
        .btn-primary:hover {
            box-shadow: 0 0 50px rgba(200, 164, 92, 0.45), 0 0 90px rgba(200, 164, 92, 0.12);
        }
        .btn-sm {
            padding: 8px 18px;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            border-width: 1.5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ========== 卦象展示区 ========== */
        .gua-display {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 6px 0;
        }
        .yao-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            transition: all 0.4s ease;
            cursor: default;
            position: relative;
            min-height: 44px;
            border: 1px solid transparent;
        }
        .yao-row:hover {
            background: rgba(255, 255, 255, 0.015);
            border-color: rgba(200, 164, 92, 0.1);
        }
        .yao-row.just-revealed {
            animation: revealYao 0.5s ease-out;
        }
        @keyframes revealYao {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .yao-label {
            font-family: var(--font-cn);
            font-size: 0.8rem;
            color: var(--text-dim);
            width: 28px;
            text-align: center;
            flex-shrink: 0;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .yao-line-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 40px;
            min-width: 80px;
        }
        .yao-line-yang {
            width: 100%;
            max-width: 170px;
            height: 5px;
            border-radius: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-light) 15%, var(--gold) 50%, var(--gold-light) 85%, transparent);
            box-shadow: 0 0 14px rgba(200, 164, 92, 0.4);
            transition: all 0.5s ease;
            position: relative;
        }
        .yao-line-yin-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 170px;
        }
        .yao-line-yin-half {
            width: 55px;
            height: 5px;
            border-radius: 3px;
            background: linear-gradient(90deg, transparent, rgba(190, 170, 140, 0.7) 20%, rgba(180, 155, 120, 0.75) 80%, transparent);
            box-shadow: 0 0 8px rgba(180, 155, 120, 0.2);
            transition: all 0.5s ease;
        }
        .yao-line-moving {
            animation: movingGlow 1.6s ease-in-out infinite;
        }
        @keyframes movingGlow {
            0%,
            100% {
                filter: brightness(1);
                box-shadow: 0 0 14px rgba(200, 164, 92, 0.4);
            }
            50% {
                filter: brightness(1.5);
                box-shadow: 0 0 28px rgba(255, 180, 80, 0.7), 0 0 50px rgba(212, 100, 74, 0.4);
            }
        }
        .yao-marker {
            position: absolute;
            font-size: 0.95rem;
            font-weight: bold;
            color: #e85d3a;
            font-family: var(--font-cn);
            animation: markerPulse 1.6s ease-in-out infinite;
            text-shadow: 0 0 12px rgba(232, 93, 58, 0.7);
            pointer-events: none;
            z-index: 3;
        }
        @keyframes markerPulse {
            0%,
            100% {
                text-shadow: 0 0 12px rgba(232, 93, 58, 0.7);
            }
            50% {
                text-shadow: 0 0 24px rgba(255, 120, 70, 1), 0 0 40px rgba(232, 93, 58, 0.8);
            }
        }
        .yao-info-tags {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            font-family: var(--font-cn);
            flex-wrap: wrap;
            justify-content: flex-end;
            min-width: 95px;
        }
        .yao-info-tags .najia {
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 0.03em;
        }
        .yao-info-tags .liuqin {
            font-weight: 600;
            color: #c8a45c;
            letter-spacing: 0.05em;
        }
        .yao-info-tags .liushou-tag {
            font-size: 0.65rem;
            color: #7a7560;
        }
        .badge {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            flex-shrink: 0;
            line-height: 1.2;
        }
        .badge-shi {
            background: rgba(200, 164, 92, 0.22);
            color: #e8c97a;
            border: 1px solid rgba(200, 164, 92, 0.5);
        }
        .badge-ying {
            background: rgba(160, 160, 180, 0.18);
            color: #b0b0c8;
            border: 1px solid rgba(160, 160, 180, 0.4);
        }

        /* ========== 卦名标题 ========== */
        .gua-header {
            text-align: center;
            padding: 4px 0 8px;
        }
        .gua-main-title {
            font-family: var(--font-cn);
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .gua-main-title .gua-symbol {
            font-size: 2rem;
            color: var(--gold-light);
            text-shadow: 0 0 20px rgba(200, 164, 92, 0.5);
        }
        .gua-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.06em;
            margin-top: 4px;
            font-family: var(--font-cn);
        }
        .gua-meta span {
            color: var(--gold-pale);
            font-weight: 500;
        }

        /* ========== 双卦布局 ========== */
        .dual-gua-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 500px) {
            .dual-gua-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .yao-info-tags {
                min-width: 60px;
                gap: 3px;
                font-size: 0.68rem;
            }
            .yao-row {
                gap: 4px;
                padding: 8px 6px;
            }
            .yao-line-yin-half {
                width: 36px;
            }
            .yao-line-yin-group {
                gap: 10px;
                max-width: 100px;
            }
            .yao-line-yang {
                max-width: 100px;
            }
            .coin {
                width: 54px;
                height: 54px;
                font-size: 1rem;
            }
            .coins-platform {
                height: 100px;
            }
            .coins-tray {
                gap: 12px;
            }
            .btn-primary {
                padding: 13px 28px;
                font-size: 0.95rem;
            }
        }
        .gua-mini-header {
            text-align: center;
            font-family: var(--font-cn);
            font-size: 0.9rem;
            color: var(--gold-light);
            letter-spacing: 0.06em;
            margin-bottom: 2px;
            font-weight: 600;
            padding: 6px 0;
            border-bottom: 1px solid rgba(200, 164, 92, 0.12);
        }
        .gua-mini-header .mini-tag {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 8px;
            background: rgba(200, 164, 92, 0.12);
            margin-left: 4px;
            font-weight: 400;
            color: var(--gold-pale);
        }

        /* ========== 信息栏 ========== */
        .info-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-family: var(--font-cn);
            letter-spacing: 0.04em;
            margin-top: 10px;
        }
        .info-strip span {
            background: var(--bg-card2);
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .info-strip .em {
            color: var(--gold-light);
            font-weight: 600;
        }
        .info-strip .em-red {
            color: #e85d3a;
            font-weight: 600;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-30px);
            z-index: 999;
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            color: var(--gold-light);
            padding: 11px 26px;
            border-radius: 30px;
            font-family: var(--font-cn);
            letter-spacing: 0.06em;
            font-size: 0.85rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.6);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 结果卡片动画 ========== */
        .card.result-reveal {
            animation: cardReveal 0.6s ease-out;
        }
        @keyframes cardReveal {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(200, 164, 92, 0.25);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- 浮动粒子 -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="taiji-wrapper">
                <div class="taiji"></div>
                <div class="taiji-ring"></div>
            </div>
            <h1>六爻排盘</h1>
            <p class="subtitle">周 易 占 卜 · 铜 钱 起 卦</p>
        </div>

        <!-- 摇卦卡片 -->
        <div class="card" id="shakeCard">
            <div class="shake-stage">
                <div class="coins-platform" id="coinsPlatform">
                    <div class="coins-tray" id="coinsTray">
                        <div class="coin" id="coin1">🪙</div>
                        <div class="coin" id="coin2">🪙</div>
                        <div class="coin" id="coin3">🪙</div>
                    </div>
                </div>
                <div class="shake-info" id="shakeHint">凝神静心，点击下方按钮摇动铜钱</div>
                <div class="shake-progress" id="shakeProgress">
                    <span style="font-size:0.7rem;color:var(--text-dim);">已摇</span>
                    <span class="shake-dot" data-index="0"></span>
                    <span class="shake-dot" data-index="1"></span>
                    <span class="shake-dot" data-index="2"></span>
                    <span class="shake-dot" data-index="3"></span>
                    <span class="shake-dot" data-index="4"></span>
                    <span class="shake-dot" data-index="5"></span>
                    <span style="font-size:0.7rem;color:var(--text-dim);">爻</span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="btnShake" title="摇卦 (空格键)">
                        ✦ 摇 卦 ✦
                    </button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-sm" id="btnTimeGua">📅 时间补爻</button>
                    <button class="btn btn-sm" id="btnClear">↺ 清空重来</button>
                </div>
            </div>
        </div>

        <!-- 排盘结果 -->
        <div class="card" id="resultCard" style="display:none;">
            <div class="gua-header" id="guaHeader"></div>
            <div class="dual-gua-grid" id="dualGuaGrid"></div>
            <div class="info-strip" id="infoStrip"></div>
        </div>

        <!-- 说明 -->
        <div class="card" style="padding:14px 18px;">
            <p style="font-size:0.7rem;color:var(--text-dim);text-align:center;letter-spacing:0.04em;font-family:var(--font-cn);margin:0;">
                📖 三枚铜钱摇六次 · 老阳⚊○老阴⚋×为动爻 · 本卦变卦相参 · 按<strong style="color:var(--gold-light);">空格键</strong>快速摇卦
            </p>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 八卦数据 ====================
            const BAGUA = {
                1: { name: '乾', wuxing: '金', symbol: '☰', nature: '天' },
                2: { name: '兑', wuxing: '金', symbol: '☱', nature: '泽' },
                3: { name: '离', wuxing: '火', symbol: '☲', nature: '火' },
                4: { name: '震', wuxing: '木', symbol: '☳', nature: '雷' },
                5: { name: '巽', wuxing: '木', symbol: '☴', nature: '风' },
                6: { name: '坎', wuxing: '水', symbol: '☵', nature: '水' },
                7: { name: '艮', wuxing: '土', symbol: '☶', nature: '山' },
                8: { name: '坤', wuxing: '土', symbol: '☷', nature: '地' }
            };

            // 八宫64卦: [卦名, 上卦, 下卦, 世爻位置(1-6)]
            const GONG_DATA = {
                '乾': [
                    ['乾为天', 1, 1, 6],
                    ['天风姤', 1, 5, 1],
                    ['天山遁', 1, 7, 2],
                    ['天地否', 1, 8, 3],
                    ['风地观', 5, 8, 4],
                    ['山地剥', 7, 8, 5],
                    ['火地晋', 3, 8, 4],
                    ['火天大有', 3, 1, 3]
                ],
                '坎': [
                    ['坎为水', 6, 6, 6],
                    ['水泽节', 6, 2, 1],
                    ['水雷屯', 6, 4, 2],
                    ['水火既济', 6, 3, 3],
                    ['泽火革', 2, 3, 4],
                    ['雷火丰', 4, 3, 5],
                    ['地火明夷', 8, 3, 4],
                    ['地水师', 8, 6, 3]
                ],
                '艮': [
                    ['艮为山', 7, 7, 6],
                    ['山火贲', 7, 3, 1],
                    ['山天大畜', 7, 1, 2],
                    ['山泽损', 7, 2, 3],
                    ['火泽睽', 3, 2, 4],
                    ['天泽履', 1, 2, 5],
                    ['风泽中孚', 5, 2, 4],
                    ['风山渐', 5, 7, 3]
                ],
                '震': [
                    ['震为雷', 4, 4, 6],
                    ['雷地豫', 4, 8, 1],
                    ['雷水解', 4, 6, 2],
                    ['雷风恒', 4, 5, 3],
                    ['地风升', 8, 5, 4],
                    ['水风井', 6, 5, 5],
                    ['泽风大过', 2, 5, 4],
                    ['泽雷随', 2, 4, 3]
                ],
                '巽': [
                    ['巽为风', 5, 5, 6],
                    ['风天小畜', 5, 1, 1],
                    ['风火家人', 5, 3, 2],
                    ['风雷益', 5, 4, 3],
                    ['天雷无妄', 1, 4, 4],
                    ['火雷噬嗑', 3, 4, 5],
                    ['山雷颐', 7, 4, 4],
                    ['山风蛊', 7, 5, 3]
                ],
                '离': [
                    ['离为火', 3, 3, 6],
                    ['火山旅', 3, 7, 1],
                    ['火风鼎', 3, 5, 2],
                    ['火水未济', 3, 6, 3],
                    ['山水蒙', 7, 6, 4],
                    ['风水涣', 5, 6, 5],
                    ['天水讼', 1, 6, 4],
                    ['天火同人', 1, 3, 3]
                ],
                '坤': [
                    ['坤为地', 8, 8, 6],
                    ['地雷复', 8, 4, 1],
                    ['地泽临', 8, 2, 2],
                    ['地天泰', 8, 1, 3],
                    ['雷天大壮', 4, 1, 4],
                    ['泽天夬', 2, 1, 5],
                    ['水天需', 6, 1, 4],
                    ['水地比', 6, 8, 3]
                ],
                '兑': [
                    ['兑为泽', 2, 2, 6],
                    ['泽水困', 2, 6, 1],
                    ['泽地萃', 2, 8, 2],
                    ['泽山咸', 2, 7, 3],
                    ['水山蹇', 6, 7, 4],
                    ['地山谦', 8, 7, 5],
                    ['雷山小过', 4, 7, 4],
                    ['雷泽归妹', 4, 2, 3]
                ]
            };

            // 64卦查找表
            const GUA64_MAP = {};
            for (const [gongName, guaList] of Object.entries(GONG_DATA)) {
                const gongWuxing = BAGUA[Object.keys(BAGUA).find(k => BAGUA[k].name === gongName)]?.wuxing || '土';
                guaList.forEach(([name, shang, xia, shiYao]) => {
                    GUA64_MAP[`${shang}-${xia}`] = { name, gong: gongName, shiYao, gongWuxing, shangGua: shang,
                        xiaGua: xia };
                });
            }

            // 纳甲基础 (八纯卦从初爻到上爻)
            const NAJIA_BASE = {
                1: ['子', '寅', '辰', '午', '申', '戌'],
                2: ['巳', '卯', '丑', '亥', '酉', '未'],
                3: ['卯', '丑', '亥', '酉', '未', '巳'],
                4: ['子', '寅', '辰', '午', '申', '戌'],
                5: ['丑', '亥', '酉', '未', '巳', '卯'],
                6: ['寅', '辰', '午', '申', '戌', '子'],
                7: ['辰', '午', '申', '戌', '子', '寅'],
                8: ['未', '巳', '卯', '丑', '亥', '酉'],
            };

            const DIZHI_WUXING = {
                '子': '水',
                '丑': '土',
                '寅': '木',
                '卯': '木',
                '辰': '土',
                '巳': '火',
                '午': '火',
                '未': '土',
                '申': '金',
                '酉': '金',
                '戌': '土',
                '亥': '水'
            };

            function getLiuQin(woWuxing, yaoWuxing) {
                const map = {
                    '金': { '金': '兄弟', '水': '子孙', '木': '妻财', '火': '官鬼', '土': '父母' },
                    '水': { '水': '兄弟', '木': '子孙', '火': '妻财', '土': '官鬼', '金': '父母' },
                    '木': { '木': '兄弟', '火': '子孙', '土': '妻财', '金': '官鬼', '水': '父母' },
                    '火': { '火': '兄弟', '土': '子孙', '金': '妻财', '水': '官鬼', '木': '父母' },
                    '土': { '土': '兄弟', '金': '子孙', '水': '妻财', '木': '官鬼', '火': '父母' },
                };
                return map[woWuxing]?.[yaoWuxing] || '—';
            }

            const LIUSHOU_ORDER = ['青龙', '朱雀', '勾陈', '螣蛇', '白虎', '玄武'];
            const RI_GAN_LIUSHOU = { '甲': 0, '乙': 0, '丙': 1, '丁': 1, '戊': 2, '己': 3, '庚': 4, '辛': 4, '壬': 5, '癸': 5 };

            function getLiuShou(riGan) {
                const start = RI_GAN_LIUSHOU[riGan] || 0;
                const result = [];
                for (let i = 0; i < 6; i++) result.push(LIUSHOU_ORDER[(start + i) % 6]);
                return result;
            }

            function getRiGan() {
                const now = new Date();
                const base = new Date(2024, 0, 1);
                const diff = Math.floor((now - base) / (1000 * 60 * 60 * 24));
                const ganArr = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
                return ganArr[((diff % 10) + 10) % 10];
            }

            function getNajiaForGua(shangNum, xiaNum) {
                const xiaFull = NAJIA_BASE[xiaNum] || NAJIA_BASE[8];
                const shangFull = NAJIA_BASE[shangNum] || NAJIA_BASE[8];
                if (shangNum === xiaNum) return [...xiaFull];
                return [...xiaFull.slice(0, 3), ...shangFull.slice(3, 6)];
            }

            function getGuaNumFromYao(threeYao) {
                const binary = threeYao.map(y => y.isYang ? '1' : '0').join('');
                const map = { '111': 1, '110': 2, '101': 3, '100': 4, '011': 5, '010': 6, '001': 7, '000': 8 };
                return map[binary] || 8;
            }

            // ==================== 状态 ====================
            let shakeResults = [];
            let currentShakeIndex = 0;
            let isAnimating = false;

            // ==================== DOM ====================
            const $coinsPlatform = document.getElementById('coinsPlatform');
            const $coin1 = document.getElementById('coin1');
            const $coin2 = document.getElementById('coin2');
            const $coin3 = document.getElementById('coin3');
            const $btnShake = document.getElementById('btnShake');
            const $btnTimeGua = document.getElementById('btnTimeGua');
            const $btnClear = document.getElementById('btnClear');
            const $shakeHint = document.getElementById('shakeHint');
            const $shakeProgress = document.getElementById('shakeProgress');
            const $resultCard = document.getElementById('resultCard');
            const $guaHeader = document.getElementById('guaHeader');
            const $dualGuaGrid = document.getElementById('dualGuaGrid');
            const $infoStrip = document.getElementById('infoStrip');
            const $toast = document.getElementById('toast');
            const $particlesContainer = document.getElementById('particlesContainer');
            const $shakeDots = $shakeProgress.querySelectorAll('.shake-dot');

            // ==================== 粒子系统 ====================
            function spawnParticles(x, y, count = 18) {
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 40 + Math.random() * 80;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist - 30;
                    p.style.cssText = `
                        left: ${x}px;
                        top: ${y}px;
                        width: ${2 + Math.random()*3}px;
                        height: ${2 + Math.random()*3}px;
                        animation: particleBurst 0.9s ease-out forwards;
                        animation-delay: ${Math.random()*0.15}s;
                        --dx: ${dx}px;
                        --dy: ${dy}px;
                        background: ${Math.random()<0.5 ? 'var(--gold-light)' : '#e8c97a'};
                    `;
                    $particlesContainer.appendChild(p);
                    p.addEventListener('animationend', () => p.remove());
                }
            }

            // 注入粒子动画keyframes
            const particleStyle = document.createElement('style');
            particleStyle.textContent = `
                @keyframes particleBurst {
                    0% { transform: translate(0, 0) scale(1); opacity: 0.9; }
                    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
                }
            `;
            document.head.appendChild(particleStyle);

            function getCoinCenter(coinEl) {
                const rect = coinEl.getBoundingClientRect();
                return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            }

            // ==================== Toast ====================
            let toastTimer;

            function showToast(msg) {
                clearTimeout(toastTimer);
                $toast.textContent = msg;
                $toast.classList.add('show');
                toastTimer = setTimeout(() => $toast.classList.remove('show'), 1800);
            }

            // ==================== 铜钱动画 ====================
            function shakeOnce() {
                const coins = [];
                for (let i = 0; i < 3; i++) coins.push(Math.random() < 0.5 ? 2 : 3);
                const total = coins[0] + coins[1] + coins[2];
                return { value: total, isMoving: total === 6 || total === 9, coins };
            }

            function animateCoins(callback) {
                if (isAnimating) return;
                isAnimating = true;
                $btnShake.disabled = true;
                $btnTimeGua.disabled = true;
                const coins = [$coin1, $coin2, $coin3];

                // 阶段1: 抛掷动画
                coins.forEach((c, i) => {
                    c.classList.remove('land-bounce');
                    c.style.animationDelay = `${i*0.08}s`;
                    c.classList.add('tossing');
                });

                // 清除抛掷动画
                setTimeout(() => {
                    coins.forEach(c => c.classList.remove('tossing'));
                }, 750);

                // 阶段2: 结果展示
                setTimeout(() => {
                    callback();
                    // 落地弹跳
                    coins.forEach((c, i) => {
                        c.style.animationDelay = `${i*0.06}s`;
                        c.classList.add('land-bounce');
                        setTimeout(() => c.classList.remove('land-bounce'), 400);
                    });
                    // 粒子效果
                    coins.forEach(c => {
                        const pos = getCoinCenter(c);
                        spawnParticles(pos.x, pos.y, 10);
                    });
                    // 平台光晕
                    const glow = document.createElement('div');
                    glow.className = 'coin-glow';
                    const platRect = $coinsPlatform.getBoundingClientRect();
                    glow.style.left = (platRect.width / 2 - 40) + 'px';
                    glow.style.top = (platRect.height / 2 - 40) + 'px';
                    $coinsPlatform.appendChild(glow);
                    setTimeout(() => glow.remove(), 700);

                    isAnimating = false;
                    $btnShake.disabled = currentShakeIndex >= 6;
                    $btnTimeGua.disabled = currentShakeIndex >= 6;
                }, 600);
            }

            function displayCoinResults(result) {
                const valToDisplay = { 6: '阴 ✕', 7: '阳', 8: '阴', 9: '阳 ○' };
                const valToClass = { 6: 'tails', 7: 'heads', 8: 'tails', 9: 'heads' };
                const coins = [$coin1, $coin2, $coin3];
                coins.forEach(c => {
                    c.textContent = valToDisplay[result.value] || '?';
                    c.className = 'coin ' + (valToClass[result.value] || '');
                });
            }

            function updateProgressDots() {
                $shakeDots.forEach((dot, i) => {
                    dot.classList.remove('filled', 'moving-dot');
                    if (i < currentShakeIndex) {
                        const isMoving = shakeResults[i]?.isMoving;
                        dot.classList.add(isMoving ? 'moving-dot' : 'filled');
                    }
                });
            }

            function performShake() {
                if (currentShakeIndex >= 6 || isAnimating) {
                    if (currentShakeIndex >= 6) showToast('已摇满六爻，请先清空再摇');
                    return;
                }
                $shakeHint.textContent = '铜钱转动中……';
                animateCoins(() => {
                    const result = shakeOnce();
                    displayCoinResults(result);
                    shakeResults.push(result);
                    currentShakeIndex++;
                    updateProgressDots();
                    const descMap = { 6: '老阴(动×)', 7: '少阳', 8: '少阴', 9: '老阳(动○)' };
                    $shakeHint.innerHTML =
                        `第<span class="highlight-num">${currentShakeIndex}</span>爻：${descMap[result.value]} | 合计 <span class="highlight-num">${result.value}</span>`;
                    if (currentShakeIndex >= 6) {
                        $shakeHint.innerHTML = '六爻已备，卦象显现 ↓';
                        $btnShake.disabled = true;
                        $btnTimeGua.disabled = true;
                        setTimeout(() => renderPaiPan(), 500);
                    }
                });
            }

            function timeQiGua() {
                if (currentShakeIndex >= 6 || isAnimating) {
                    if (currentShakeIndex >= 6) showToast('已摇满六爻，请先清空');
                    return;
                }
                const remaining = 6 - currentShakeIndex;
                $shakeHint.textContent = '以时起卦中……';
                animateCoins(() => {
                    for (let i = 0; i < remaining; i++) {
                        const seed = (Date.now() + i * 137 + Math.random() * 1000) % 10000 / 10000;
                        const coins = [];
                        for (let j = 0; j < 3; j++) coins.push(((Math.floor(seed * (j + 1) * 7.13) % 2) === 0) ? 2 :
                            3);
                        const total = coins[0] + coins[1] + coins[2];
                        shakeResults.push({ value: total, isMoving: total === 6 || total === 9, coins });
                    }
                    currentShakeIndex = 6;
                    updateProgressDots();
                    displayCoinResults(shakeResults[5]);
                    $shakeHint.innerHTML = '六爻已备（时间补爻），卦象显现 ↓';
                    $btnShake.disabled = true;
                    $btnTimeGua.disabled = true;
                    setTimeout(() => renderPaiPan(), 500);
                });
            }

            function clearAll() {
                if (isAnimating) return;
                shakeResults = [];
                currentShakeIndex = 0;
                $btnShake.disabled = false;
                $btnTimeGua.disabled = false;
                $shakeHint.textContent = '凝神静心，点击下方按钮摇动铜钱';
                $resultCard.style.display = 'none';
                $resultCard.classList.remove('result-reveal');
                [$coin1, $coin2, $coin3].forEach(c => {
                    c.textContent = '🪙';
                    c.className = 'coin';
                });
                $shakeDots.forEach(d => d.classList.remove('filled', 'moving-dot'));
                showToast('已清空，重新起卦');
            }

            // ==================== 排盘渲染 ====================
            function renderPaiPan() {
                if (shakeResults.length !== 6) return;
                const benGuaYao = shakeResults.map(r => ({
                    value: r.value,
                    isYang: r.value === 7 || r.value === 9,
                    isMoving: r.isMoving
                }));
                const xiaNum = getGuaNumFromYao(benGuaYao.slice(0, 3));
                const shangNum = getGuaNumFromYao(benGuaYao.slice(3, 6));
                const bianGuaYao = benGuaYao.map(y => ({
                    isYang: y.isMoving ? !y.isYang : y.isYang,
                    isMoving: false
                }));
                const bianXiaNum = getGuaNumFromYao(bianGuaYao.slice(0, 3));
                const bianShangNum = getGuaNumFromYao(bianGuaYao.slice(3, 6));
                const benInfo = GUA64_MAP[`${shangNum}-${xiaNum}`];
                const bianInfo = GUA64_MAP[`${bianShangNum}-${bianXiaNum}`];
                if (!benInfo) { showToast('卦象识别失败，请重试'); return; }
                const gongWuxing = benInfo.gongWuxing;
                const shiYao = benInfo.shiYao;
                const yingYao = ((shiYao + 2) % 6) + 1;
                const benNajia = getNajiaForGua(shangNum, xiaNum);
                const bianNajia = getNajiaForGua(bianShangNum, bianXiaNum);
                const riGan = getRiGan();
                const liuShou = getLiuShou(riGan);
                const hasMoving = benGuaYao.some(y => y.isMoving);
                const bgShang = BAGUA[shangNum];
                const bgXia = BAGUA[xiaNum];

                // 标题
                $guaHeader.innerHTML = `
                    <div class="gua-main-title">
                        <span class="gua-symbol">${bgShang?.symbol||'?'}</span>
                        <span>${benInfo.name}</span>
                        <span class="gua-symbol">${bgXia?.symbol||'?'}</span>
                    </div>
                    <div class="gua-meta">
                        宫位：<span>${benInfo.gong}宫</span> ·
                        五行：<span>${gongWuxing}</span> ·
                        世爻：<span>第${shiYao}爻</span> ·
                        日干：<span>${riGan}</span>
                        ${hasMoving ? ' · <span style="color:#e85d3a;">有动爻</span>' : ' · <span style="color:#5d8a5e;">静卦</span>'}
                    </div>
                `;

                // 双卦
                $dualGuaGrid.innerHTML = `
                    <div>
                        <div class="gua-mini-header">本卦<span class="mini-tag">${benInfo.name}</span></div>
                        ${buildYaoList(benGuaYao, benNajia, gongWuxing, shiYao, yingYao, liuShou, true)}
                    </div>
                    <div>
                        <div class="gua-mini-header">变卦<span class="mini-tag">${bianInfo?.name||'—'}</span></div>
                        ${buildYaoList(bianGuaYao, bianNajia, gongWuxing, shiYao, yingYao, liuShou, false)}
                    </div>
                `;

                // 信息条
                const movingStr = benGuaYao.map((y, i) => y.isMoving ? `第${i+1}爻` : null).filter(Boolean).join('、');
                $infoStrip.innerHTML = `
                    <span>宫位：<span class="em">${benInfo.gong}宫·${gongWuxing}</span></span>
                    <span>世爻：<span class="em">第${shiYao}爻</span></span>
                    <span>应爻：<span class="em">第${yingYao}爻</span></span>
                    ${movingStr ? `<span>动爻：<span class="em-red">${movingStr}</span></span>` : '<span>静卦</span>'}
                    <span>六兽始：<span class="em">${liuShou[0]}</span></span>
                `;

                $resultCard.style.display = 'block';
                $resultCard.classList.add('result-reveal');
                // 重新触发动画
                $resultCard.classList.remove('result-reveal');
                void $resultCard.offsetWidth;
                $resultCard.classList.add('result-reveal');

                // 爻行逐条动画
                const allYaoRows = $resultCard.querySelectorAll('.yao-row');
                allYaoRows.forEach((row, i) => {
                    row.classList.remove('just-revealed');
                    row.style.animationDelay = `${i*0.06}s`;
                    void row.offsetWidth;
                    row.classList.add('just-revealed');
                });

                $resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            function buildYaoList(yaoArr, najiaArr, gongWuxing, shiYao, yingYao, liuShou, isBenGua) {
                const yaoNames = ['初', '二', '三', '四', '五', '上'];
                let html = '<div class="gua-display">';
                for (let i = 5; i >= 0; i--) {
                    const yao = yaoArr[i];
                    const najia = najiaArr[i] || '?';
                    const yaoWuxing = DIZHI_WUXING[najia] || '?';
                    const liuqin = getLiuQin(gongWuxing, yaoWuxing);
                    const yaoPos = i + 1;
                    const isShi = yaoPos === shiYao;
                    const isYing = yaoPos === yingYao;
                    const isMoving = yao.isMoving && isBenGua;
                    let lineHtml;
                    if (yao.isYang) {
                        lineHtml =
                            `<div class="yao-line-yang${isMoving?' yao-line-moving':''}" style="max-width:170px;"></div>`;
                    } else {
                        lineHtml = `
                            <div class="yao-line-yin-group${isMoving?' yao-line-moving':''}" style="max-width:170px;">
                                <div class="yao-line-yin-half"></div>
                                <div class="yao-line-yin-half"></div>
                            </div>`;
                    }
                    let markerHtml = '';
                    if (isMoving) {
                        markerHtml = yao.isYang ?
                            '<span class="yao-marker" style="right:-10px;">○</span>' :
                            '<span class="yao-marker" style="right:-6px;">×</span>';
                    }
                    html += `
                        <div class="yao-row" style="animation-delay:${(5-i)*0.05}s;">
                            <span class="yao-label">${yaoNames[i]}爻</span>
                            <div class="yao-line-area">${lineHtml}${markerHtml}</div>
                            <span class="yao-info-tags">
                                <span class="najia">${najia}</span>
                                <span class="liuqin">${liuqin}</span>
                                <span class="liushou-tag">${liuShou[i]}</span>
                                ${isShi?'<span class="badge badge-shi">世</span>':''}
                                ${isYing?'<span class="badge badge-ying">应</span>':''}
                            </span>
                        </div>`;
                }
                html += '</div>';
                return html;
            }

            // ==================== 事件绑定 ====================
            $btnShake.addEventListener('click', performShake);
            $btnTimeGua.addEventListener('click', timeQiGua);
            $btnClear.addEventListener('click', clearAll);
            document.addEventListener('keydown', (e) => {
                if ((e.key === ' ' || e.code === 'Space') && !isAnimating && currentShakeIndex < 6) {
                    e.preventDefault();
                    performShake();
                }
                if (e.key === 'r' && e.ctrlKey) {
                    e.preventDefault();
                    clearAll();
                }
            });

            // ==================== 初始粒子背景 ====================
            function ambientParticles() {
                setInterval(() => {
                    if ($particlesContainer.children.length > 30) return;
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.cssText = `
                        left: ${Math.random()*100}vw;
                        top: 105vh;
                        animation: floatUp ${5+Math.random()*7}s ease-in forwards;
                        width: ${1+Math.random()*2.5}px;
                        height: ${1+Math.random()*2.5}px;
                        background: rgba(200,164,92,${0.3+Math.random()*0.5});
                    `;
                    $particlesContainer.appendChild(p);
                    p.addEventListener('animationend', () => p.remove());
                }, 1800);
            }
            ambientParticles();

            // ==================== 初始化 ====================
            console.log('🔮 六爻排盘系统 v2.0 已就绪');
            console.log('  按空格键摇卦 | Ctrl+R 清空');
            console.log('  八卦基础已加载 | 64卦映射共', Object.keys(GUA64_MAP).length, '卦');
            updateProgressDots();
        })();
    </script>
</body>
</html>
